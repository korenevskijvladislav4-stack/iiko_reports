# Конфиг Nginx для iiko Отчёты
# Скопировать: sudo cp deploy/nginx.conf /etc/nginx/sites-available/iiko-reports
# Включить:   sudo ln -sf /etc/nginx/sites-available/iiko-reports /etc/nginx/sites-enabled/
# Проверить:  sudo nginx -t && sudo systemctl reload nginx
# Заменить ваш-домен.ru на свой домен или _ для приёма по IP

server {
    listen 80;
    server_name ваш-домен.ru;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
