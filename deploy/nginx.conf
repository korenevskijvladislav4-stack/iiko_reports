# Nginx: iiko Отчёты
# Приложение слушает порт 3001; Nginx проксирует на него.
#
# Установка:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/iiko-reports
#   sudo nano /etc/nginx/sites-available/iiko-reports   # заменить ваш-домен.ru
#   sudo ln -sf /etc/nginx/sites-available/iiko-reports /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (после certbot):
#   sudo certbot --nginx -d ваш-домен.ru

server {
    listen 80;
    server_name ваш-домен.ru;   # или _ для доступа по IP

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

